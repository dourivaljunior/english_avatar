<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mario Tutor - Animado</title>
    <style>
        :root { --bg: #020617; --blue: #00d2ff; --green: #39ff14; --red: #ff4d4d; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: white; display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; }
        
        .card { background: rgba(30, 41, 59, 0.8); backdrop-filter: blur(12px); padding: 2rem; border-radius: 2rem; text-align: center; width: 380px; border: 1px solid rgba(0, 210, 255, 0.2); }
        
        .avatar-container {
            width: 200px; height: 200px; margin: 0 auto 1.5rem; position: relative;
        }

        .avatar-circle {
            width: 100%; height: 100%; border-radius: 50%;
            border: 6px solid #1e293b; overflow: hidden; background: #000;
            transition: 0.3s; display: flex; align-items: center; justify-content: center;
        }
        
        #mario-img { width: 100%; height: 100%; object-fit: cover; display: none; }

        /* Animação de Fala (Simula movimento de boca/rosto) */
        .talking {
            animation: mouthMove 0.2s infinite alternate;
            border-color: var(--green) !important;
            box-shadow: 0 0 25px var(--green);
        }

        @keyframes mouthMove {
            from { transform: scale(1); filter: brightness(1); }
            to { transform: scale(1.03) translateY(-2px); filter: brightness(1.2); }
        }

        .listening { border-color: var(--red); box-shadow: 0 0 25px var(--red); }

        .btn-main { background: var(--blue); color: #000; border: none; padding: 1rem; border-radius: 1rem; font-weight: 800; cursor: pointer; width: 100%; margin-top: 15px; }
        #display-text { margin-top: 1.5rem; font-size: 0.9rem; height: 70px; overflow-y: auto; background: rgba(0,0,0,0.4); padding: 12px; border-radius: 12px; text-align: left; border-left: 3px solid var(--blue); }
        
        .file-box { text-align: left; margin-bottom: 10px; font-size: 0.75rem; }
        input[type="file"] { width: 100%; margin-top: 5px; color: #94a3b8; }
    </style>
</head>
<body>

<div class="card">
    <div class="avatar-container">
        <div class="avatar-circle" id="mario-ui">
            <img id="mario-img" src="" alt="Mário">
        </div>
    </div>

    <div class="file-box">
        <label>1. FOTO (avatar.jfif):</label>
        <input type="file" id="imgFile" accept="image/*">
        <label style="display:block; margin-top:8px">2. CHAVE (key.txt):</label>
        <input type="file" id="keyFile" accept=".txt">
    </div>

    <button id="actionBtn" class="btn-main">INICIAR CONVERSA</button>
    <div id="display-text">Carregue os arquivos para começar.</div>
</div>

<script>
    let GROQ_KEY = "";
    let isActive = false;
    let maleVoice = null;

    const btn = document.getElementById('actionBtn');
    const log = document.getElementById('display-text');
    const ui = document.getElementById('mario-ui');
    const imgElement = document.getElementById('mario-img');

    // Carregador de Imagem
    document.getElementById('imgFile').onchange = (e) => {
        const file = e.target.files[0];
        if (file) {
            const reader = new FileReader();
            reader.onload = (ev) => {
                imgElement.src = ev.target.result;
                imgElement.style.display = "block";
            };
            reader.readAsDataURL(file);
        }
    };

    // Carregador de Chave
    document.getElementById('keyFile').onchange = (e) => {
        const reader = new FileReader();
        reader.onload = (ev) => {
            GROQ_KEY = ev.target.result.trim().replace(/[\n\r\t\s]/g, "");
            log.innerText = "Sistema Pronto!";
        };
        reader.readAsText(e.target.files[0]);
    };

    // Configuração de Voz Masculina
    function loadVoices() {
        const voices = window.speechSynthesis.getVoices();
        // Busca por vozes masculinas comuns (Google US English, Microsoft David, etc)
        maleVoice = voices.find(v => v.name.includes("David") || v.name.includes("Guy") || (v.lang === "en-US" && v.name.includes("Male")));
        if (!maleVoice) maleVoice = voices.find(v => v.lang.includes("en"));
    }
    window.speechSynthesis.onvoiceschanged = loadVoices;

    const recognition = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
    recognition.lang = 'en-US';

    btn.onclick = () => {
        if (!GROQ_KEY || !imgElement.src) return alert("Selecione a imagem e a chave!");
        if (!isActive) {
            isActive = true;
            btn.innerText = "ENCERRAR";
            btn.style.background = "#334155";
            btn.style.color = "#fff";
            startListening();
        } else {
            location.reload();
        }
    };

    function startListening() {
        if (!isActive) return;
        try {
            recognition.start();
            ui.className = "avatar-circle listening";
            log.innerHTML = "<b>Ouvindo...</b>";
        } catch (e) {}
    }

    recognition.onresult = async (event) => {
        const text = event.results[0][0].transcript;
        log.innerHTML = `<b>Você:</b> ${text}`;
        ui.className = "avatar-circle";
        await askGroq(text);
    };

    async function askGroq(userInput) {
        log.innerHTML = "<i>Pensando...</i>";
        try {
            const response = await fetch("https://api.groq.com/openai/v1/chat/completions", {
                method: "POST",
                headers: { "Authorization": `Bearer ${GROQ_KEY}`, "Content-Type": "application/json" },
                body: JSON.stringify({
                    model: "llama-3.3-70b-versatile",
                    messages: [{ role: "system", content: "You are Mario, a male English teacher. Speak naturally and briefly." }, { role: "user", content: userInput }]
                })
            });
            const data = await response.json();
            speak(data.choices[0].message.content);
        } catch (err) { log.innerHTML = "Erro na conexão."; }
    }

    function speak(text) {
        const utterance = new SpeechSynthesisUtterance(text);
        if (maleVoice) utterance.voice = maleVoice;
        utterance.lang = 'en-US';
        utterance.rate = 0.9; // Velocidade levemente mais lenta para clareza
        utterance.pitch = 0.9; // Tom mais grave para voz masculina

        utterance.onstart = () => {
            ui.classList.add("talking"); // Inicia animação visual
            log.innerHTML = `<b>Mário:</b> ${text}`;
        };

        utterance.onend = () => {
            ui.classList.remove("talking"); // Para animação
            if (isActive) setTimeout(startListening, 600);
        };

        window.speechSynthesis.speak(utterance);
    }
</script>
</body>
</html>
