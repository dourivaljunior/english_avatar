<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI English Tutor - Ultra Edition</title>
    <style>
        :root {
            --primary: #6366f1;
            --bg: #0f172a;
            --card: #1e293b;
            --text: #f8fafc;
            --accent: #10b981;
        }

        body {
            margin: 0; font-family: system-ui, -apple-system, sans-serif;
            background: var(--bg); color: var(--text);
            display: flex; height: 100vh; overflow: hidden;
        }

        main {
            display: flex; width: 100%; max-width: 1200px; margin: auto;
            height: 85vh; gap: 20px; padding: 20px;
        }

        /* Avatar Section */
        #avatar-box {
            flex: 1; background: var(--card); border-radius: 24px;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            border: 1px solid rgba(255,255,255,0.1); position: relative;
        }

        .circle {
            width: 300px; height: 300px; border-radius: 50%;
            background: #2d3748; border: 5px solid var(--primary);
            display: flex; align-items: center; justify-content: center;
            overflow: hidden; position: relative;
            box-shadow: 0 0 40px rgba(99, 102, 241, 0.3);
        }

        /* SVG Avatar Embutido (Garante que sempre apareça) */
        #teacher-svg { width: 220px; height: 220px; transition: all 0.3s; }

        .talking #teacher-svg { animation: talk-anim 0.2s infinite alternate; }
        @keyframes talk-anim { to { transform: scale(1.05) translateY(-5px); } }

        /* Chat Section */
        #chat-box {
            width: 400px; background: var(--card); border-radius: 24px;
            display: flex; flex-direction: column; padding: 20px;
            border: 1px solid rgba(255,255,255,0.1);
        }

        #log { flex: 1; overflow-y: auto; margin-bottom: 20px; padding-right: 10px; }
        .msg { margin-bottom: 15px; padding: 12px 16px; border-radius: 16px; font-size: 14px; line-height: 1.5; }
        .user { background: var(--primary); align-self: flex-end; margin-left: 40px; }
        .ai { background: rgba(255,255,255,0.05); align-self: flex-start; margin-right: 40px; }

        button {
            background: var(--primary); color: white; border: none;
            padding: 16px; border-radius: 12px; font-weight: bold;
            cursor: pointer; transition: 0.2s; font-size: 16px;
        }
        button:hover { opacity: 0.9; transform: translateY(-2px); }
        button:disabled { background: #475569; cursor: not-allowed; transform: none; }

        .status { font-size: 12px; color: #94a3b8; margin-bottom: 10px; display: flex; align-items: center; gap: 5px; }
        .dot { width: 8px; height: 8px; border-radius: 50%; background: #475569; }
        .active .dot { background: var(--accent); box-shadow: 0 0 8px var(--accent); }
    </style>
</head>
<body>

    <main>
        <div id="avatar-box">
            <div class="circle" id="avatar-container">
                <!-- SVG da Professora Embutido diretamente no HTML -->
                <svg id="teacher-svg" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
                    <circle cx="100" cy="100" r="90" fill="#3182ce" opacity="0.1"/>
                    <!-- Cabelo -->
                    <path d="M40 100 Q40 40 100 40 Q160 40 160 100" stroke="#2D3748" stroke-width="20" fill="none"/>
                    <!-- Rosto -->
                    <circle cx="100" cy="105" r="50" fill="#FBD38D"/>
                    <!-- Olhos -->
                    <circle cx="80" cy="100" r="5" fill="#2D3748"/>
                    <circle cx="120" cy="100" r="5" fill="#2D3748"/>
                    <!-- Boca -->
                    <path id="mouth" d="M85 130 Q100 140 115 130" stroke="#2D3748" stroke-width="3" fill="none"/>
                    <!-- Óculos (Estilo Professora) -->
                    <path d="M65 100 L90 100 M110 100 L135 100" stroke="#2D3748" stroke-width="2"/>
                    <circle cx="75" cy="100" r="12" stroke="#2D3748" stroke-width="2" fill="none"/>
                    <circle cx="125" cy="100" r="12" stroke="#2D3748" stroke-width="2" fill="none"/>
                </svg>
            </div>
            <h2 style="margin-top: 20px;">English Teacher</h2>
        </div>

        <div id="chat-box">
            <div class="status active" id="status-ui">
                <div class="dot"></div> <span id="status-text">Pronta</span>
            </div>
            <div id="log">
                <div class="msg ai">Olá! Sou sua professora de inglês. Vamos começar?</div>
            </div>
            <button id="btn">Começar Conversa</button>
        </div>
    </main>

    <script>
        // CONFIGURAÇÃO - COLOQUE SUA CHAVE AQUI
        const API_KEY = "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";

        const btn = document.getElementById('btn');
        const log = document.getElementById('log');
        const avatar = document.getElementById('avatar-container');
        const statusText = document.getElementById('status-text');

        // Voz e Reconhecimento
        const recognition = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
        recognition.lang = 'en-US';

        function addMsg(text, side) {
            const d = document.createElement('div');
            d.className = `msg ${side}`;
            d.innerText = text;
            log.appendChild(d);
            log.scrollTop = log.scrollHeight;
        }

        async function talkToAI(text) {
            if (API_KEY === "SUA_CHAVE_GROQ_AQUI") {
                const m = "Erro: Chave API não configurada no código (linha 97).";
                addMsg(m, 'ai');
                speak(m);
                return;
            }

            statusText.innerText = "Pensando...";
            try {
                const response = await fetch("https://api.groq.com/openai/v1/chat/completions", {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json",
                        "Authorization": `Bearer ${API_KEY}`
                    },
                    body: JSON.stringify({
                        model: "llama-3.3-70b-versatile",
                        messages: [
                            {role: "system", content: "You are a professional female English teacher. Be concise."},
                            {role: "user", content: text}
                        ]
                    })
                });

                const data = await response.json();
                if (data.error) throw new Error(data.error.message);
                
                const reply = data.choices[0].message.content;
                addMsg(reply, 'ai');
                speak(reply);
            } catch (e) {
                addMsg("Erro de Conexão: " + e.message, 'ai');
                btn.disabled = false;
                statusText.innerText = "Erro";
            }
        }

        function speak(text) {
            const ut = new SpeechSynthesisUtterance(text);
            ut.lang = 'en-US';
            ut.onstart = () => {
                avatar.classList.add('talking');
                statusText.innerText = "Falando...";
            };
            ut.onend = () => {
                avatar.classList.remove('talking');
                statusText.innerText = "Pronta";
                btn.disabled = false;
                btn.innerText = "Falar Novamente";
            };
            window.speechSynthesis.speak(ut);
        }

        let first = true;
        btn.onclick = () => {
            if (first) {
                first = false;
                const g = "Let's start talking!";
                addMsg(g, 'ai');
                speak(g);
                btn.disabled = true;
                return;
            }
            recognition.start();
            btn.disabled = true;
            btn.innerText = "Ouvindo...";
            statusText.innerText = "Ouvindo...";
        };

        recognition.onresult = (e) => {
            const t = e.results[0][0].transcript;
            addMsg(t, 'user');
            talkToAI(t);
        };

        recognition.onerror = () => {
            btn.disabled = false;
            btn.innerText = "Tentar Novamente";
        };
    </script>
</body>
</html>
