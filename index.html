<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Mário Tutor - Interativo</title>
    <style>
        :root { --bg: #020617; --neon: #39ff14; --cyber: #00d2ff; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: white; display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; overflow: hidden; }
        
        .container { text-align: center; width: 400px; z-index: 2; }

        /* Círculo do Avatar com Ondas de Choque */
        .avatar-wrapper {
            position: relative;
            width: 220px;
            height: 220px;
            margin: 0 auto 2rem;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* Ondas que reagem ao som */
        .wave {
            position: absolute;
            width: 100%;
            height: 100%;
            border: 2px solid var(--neon);
            border-radius: 50%;
            opacity: 0;
            pointer-events: none;
        }

        .avatar-circle {
            width: 200px;
            height: 200px;
            border-radius: 50%;
            border: 4px solid #1e293b;
            overflow: hidden;
            background: #000;
            z-index: 5;
            transition: 0.2s;
        }

        #mario-img { width: 100%; height: 100%; object-fit: cover; }

        /* Animação de Fala - Distorção Labial via CSS */
        .talking-anim {
            animation: speakAction 0.15s infinite alternate ease-in-out;
            border-color: var(--neon);
        }

        @keyframes speakAction {
            0% { transform: scale(1); clip-path: ellipse(100% 100% at 50% 50%); }
            100% { transform: scale(1.02); clip-path: ellipse(98% 92% at 50% 48%); }
        }

        .listening-anim {
            border-color: #ff4d4d;
            box-shadow: 0 0 20px #ff4d4d;
        }

        /* UI */
        .controls { background: rgba(255,255,255,0.05); padding: 20px; border-radius: 20px; backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.1); }
        button { width: 100%; padding: 12px; border-radius: 10px; border: none; font-weight: bold; cursor: pointer; margin-top: 10px; text-transform: uppercase; }
        #startBtn { background: var(--cyber); color: #000; }
        #display-text { margin-top: 15px; font-size: 0.9rem; min-height: 60px; color: #cbd5e1; text-align: left; }
    </style>
</head>
<body>

<div class="container">
    <div class="avatar-wrapper" id="wrapper">
        <div class="wave" id="w1"></div>
        <div class="wave" id="w2"></div>
        <div class="avatar-circle" id="mario-ui">
            <img id="mario-img" src="avatar.jfif" alt="Mario">
        </div>
    </div>

    <div class="controls">
        <input type="file" id="imgFile" accept="image/*" style="font-size: 0.7rem; margin-bottom: 10px;">
        <input type="file" id="keyFile" accept=".txt" style="font-size: 0.7rem; margin-bottom: 10px;">
        <button id="startBtn">Iniciar Tutor</button>
        <div id="display-text">Carregue os arquivos para começar.</div>
    </div>
</div>

<script>
    let GROQ_KEY = "";
    let isActive = false;
    let maleVoice = null;

    const btn = document.getElementById('startBtn');
    const log = document.getElementById('display-text');
    const ui = document.getElementById('mario-ui');
    const imgElement = document.getElementById('mario-img');

    // Carregamento de arquivos
    document.getElementById('imgFile').onchange = (e) => {
        const reader = new FileReader();
        reader.onload = (ev) => { imgElement.src = ev.target.result; imgElement.style.display = "block"; };
        reader.readAsDataURL(e.target.files[0]);
    };

    document.getElementById('keyFile').onchange = (e) => {
        const reader = new FileReader();
        reader.onload = (ev) => { GROQ_KEY = ev.target.result.trim(); log.innerText = "Chave pronta!"; };
        reader.readAsText(e.target.files[0]);
    };

    // Voz Masculina
    function setVoice() {
        const voices = window.speechSynthesis.getVoices();
        maleVoice = voices.find(v => v.name.includes("David") || v.name.includes("Guy") || v.name.includes("Google US English Male"));
    }
    window.speechSynthesis.onvoiceschanged = setVoice;

    const recognition = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
    recognition.lang = 'en-US';

    btn.onclick = () => {
        if (!GROQ_KEY) return alert("Falta a chave!");
        isActive = true;
        btn.style.display = "none";
        listen();
    };

    function listen() {
        try {
            recognition.start();
            ui.className = "avatar-circle listening-anim";
            log.innerHTML = "<b>Ouvindo...</b>";
        } catch(e) {}
    }

    recognition.onresult = async (event) => {
        const text = event.results[0][0].transcript;
        ui.className = "avatar-circle";
        await askGroq(text);
    };

    async function askGroq(t) {
        log.innerHTML = "<i>Pensando...</i>";
        const res = await fetch("https://api.groq.com/openai/v1/chat/completions", {
            method: "POST",
            headers: { "Authorization": `Bearer ${GROQ_KEY}`, "Content-Type": "application/json" },
            body: JSON.stringify({
                model: "llama-3.3-70b-versatile",
                messages: [{role: "system", content: "You are Mario, a male English teacher. Brief answers."}, {role: "user", content: t}]
            })
        });
        const d = await res.json();
        speak(d.choices[0].message.content);
    }

    function speak(text) {
        const utterance = new SpeechSynthesisUtterance(text);
        if (maleVoice) utterance.voice = maleVoice;
        utterance.lang = 'en-US';
        utterance.pitch = 0.8; // Mais grave

        utterance.onstart = () => {
            ui.className = "avatar-circle talking-anim";
            animateWaves(true);
            log.innerHTML = `<b>Mário:</b> ${text}`;
        };

        utterance.onend = () => {
            ui.className = "avatar-circle";
            animateWaves(false);
            if (isActive) setTimeout(listen, 600);
        };

        window.speechSynthesis.speak(utterance);
    }

    function animateWaves(start) {
        const w1 = document.getElementById('w1');
        const w2 = document.getElementById('w2');
        if(start) {
            w1.style.animation = "pulseWave 1s infinite";
            w2.style.animation = "pulseWave 1s infinite 0.5s";
        } else {
            w1.style.animation = "none";
            w2.style.animation = "none";
        }
    }
</script>

<style>
    @keyframes pulseWave {
        0% { transform: scale(1); opacity: 0.8; }
        100% { transform: scale(1.5); opacity: 0; }
    }
</style>
</body>
</html>
